  
  name: CI

  on:
    push:
      branches: [main]
    pull_request:

  jobs:
    servidor-go:
      name: Servidor (Go)
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: server
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-go@v5
          with:
            go-version-file: server/go.mod
        - name: Compilar
          run: go build ./...
        - name: Pruebas
          run: go test ./...
  
    app-flutter:
      name: App (Flutter)
      runs-on: ubuntu-latest
      defaults:
        run:
          working-directory: app
      steps:
        - uses: actions/checkout@v4
        - uses: subosito/flutter-action@v2
          with:
            channel: stable
        - name: Instalar dependencias
          run: flutter pub get
        - name: Revisar código
          run: flutter analyze
        - name: Pruebas
          run: flutter test

    desplegar:
      name: Desplegar en Render
      needs: [servidor-go, app-flutter]   # solo si los tests pasan
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      runs-on: ubuntu-latest
      steps:
        - name: Disparar el deploy en Render
          run: |
            if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
              curl -fsS -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
              echo "Deploy disparado en Render ✅"
            else
              echo "Falta el secreto RENDER_DEPLOY_HOOK. Añádelo en GitHub para activar el auto-deploy."
            fi
