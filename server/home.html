<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente IA</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    :root {
      --azul: #1a73e8;
      --azul-osc: #1557b0;
      --fondo: #f4f6fb;
      --cabecera: linear-gradient(135deg, #1a73e8, #6c4ee0);
      --burbuja-ia: #ffffff;
      --texto-ia: #1f2733;
      --texto-yo: #ffffff;
      --barra: #ffffff;
      --borde: #e2e6ee;
      --chip: #eef1f8;
      --chip-texto: #1a73e8;
      --codigo-fondo: #1e1e2e;
      --codigo-texto: #e7e7f0;
      --panel: #ffffff;
      --sombra: 0 2px 10px rgba(0,0,0,0.06);
    }
    body.oscuro {
      --fondo: #0f1420;
      --burbuja-ia: #1c2333;
      --texto-ia: #e7ebf3;
      --barra: #161c29;
      --borde: #2a3346;
      --chip: #1c2333;
      --chip-texto: #7aa7ff;
      --panel: #161c29;
      --sombra: 0 2px 10px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      background: var(--fondo);
      color: var(--texto-ia);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }
    header { min-width: 0; }
    header {
      background: var(--cabecera);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--sombra);
      z-index: 2;
    }
    .titulo { display: flex; flex-direction: column; flex: 1; min-width: 0; overflow: hidden; }
    .titulo b { font-size: 18px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .titulo span { font-size: 12px; opacity: 0.9; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .acciones { display: flex; gap: 8px; flex-shrink: 0; }
    .icono {
      background: rgba(255,255,255,0.18);
      border: none;
      color: #fff;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 17px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .icono:hover { background: rgba(255,255,255,0.32); }
    .icono.activo { background: #ffd166; color: #1f2733; }

    #mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .burbuja {
      max-width: 80%;
      padding: 11px 15px;
      border-radius: 18px;
      line-height: 1.45;
      word-wrap: break-word;
      box-shadow: var(--sombra);
      animation: aparecer 0.25s ease;
    }
    @keyframes aparecer {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .yo {
      align-self: flex-end;
      background: var(--azul);
      color: var(--texto-yo);
      border-bottom-right-radius: 5px;
      white-space: pre-wrap;
    }
    .ia {
      align-self: flex-start;
      background: var(--burbuja-ia);
      color: var(--texto-ia);
      border-bottom-left-radius: 5px;
    }
    .codigo { position: relative; margin: 8px 0; }
    .codigo pre {
      background: var(--codigo-fondo);
      color: var(--codigo-texto);
      padding: 14px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 0;
      font-size: 13.5px;
    }
    .codigo code { font-family: "SF Mono", Menlo, Consolas, monospace; }
    .copiar {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 12px;
      cursor: pointer;
    }
    .copiar:hover { background: rgba(255,255,255,0.3); }
    .ia .t1 { font-size: 18px; font-weight: 700; margin: 9px 0 4px; }
    .ia .t2 { font-size: 16px; font-weight: 700; margin: 8px 0 4px; }
    .ia .t3 { font-size: 15px; font-weight: 700; margin: 7px 0 3px; }
    .ia .li { margin: 3px 0 3px 6px; }
    .hora { font-size: 10px; opacity: 0.55; margin-top: 4px; text-align: right; }
    .yo .hora { color: rgba(255,255,255,0.8); }
    code.inline {
      background: rgba(125,125,125,0.18);
      padding: 1px 5px;
      border-radius: 5px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.92em;
    }

    #ejemplos, #sugerencias {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 18px 8px;
    }
    #buscarConv {
      margin: 0 12px 10px;
      padding: 9px 12px;
      border: 1px solid var(--borde);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: var(--fondo);
      color: var(--texto-ia);
    }
    .chip {
      background: var(--chip);
      color: var(--chip-texto);
      border: 1px solid var(--borde);
      border-radius: 18px;
      padding: 8px 14px;
      font-size: 13.5px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .chip:hover { transform: scale(1.04); }

    form {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--borde);
      background: var(--barra);
      align-items: flex-end;
    }
    #texto {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--borde);
      border-radius: 22px;
      font-size: 15px;
      outline: none;
      background: var(--fondo);
      color: var(--texto-ia);
      font-family: inherit;
      line-height: 1.4;
      resize: none;
      max-height: 140px;
      overflow-y: auto;
    }
    #texto:focus { border-color: var(--azul); }
    #micro, #btnFoto {
      background: var(--chip);
      color: var(--chip-texto);
      border: 1px solid var(--borde);
      border-radius: 50%;
      width: 46px;
      font-size: 18px;
      cursor: pointer;
    }
    #micro.grabando { background: #ff4d4d; color: #fff; animation: latido 1s infinite; }
    @keyframes latido { 50% { opacity: 0.5; } }
    #enviar {
      background: var(--azul);
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 0 22px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #enviar:hover { background: var(--azul-osc); }
    #enviar.parar { background: #ff4d4d; }
    .img-generada { display: block; margin-top: 8px; max-width: 280px; width: 100%; border-radius: 12px; }
    #previewFoto { padding: 4px 12px 0; display: flex; align-items: center; gap: 6px; }
    #previewFoto img { max-height: 64px; border-radius: 8px; }
    #previewFoto .quitar-foto { border: none; background: #ff4d4d; color: #fff; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 12px; }
    .menu-foto { position: fixed; left: 10px; bottom: 70px; background: var(--burbuja-ia, var(--chip)); border: 1px solid var(--borde); border-radius: 12px; box-shadow: 0 6px 18px rgba(0,0,0,.18); padding: 6px; display: flex; flex-direction: column; gap: 4px; z-index: 60; }
    .menu-foto button { border: none; background: transparent; padding: 10px 16px; text-align: left; font-size: 14px; cursor: pointer; border-radius: 8px; color: var(--chip-texto); white-space: nowrap; }
    .menu-foto button:active, .menu-foto button:hover { background: var(--azul); color: #fff; }
    #accionesRapidas { display: flex; gap: 8px; padding: 0 12px 4px; flex-wrap: wrap; }
    #accionesRapidas button { border: 1px solid var(--borde); background: var(--chip); color: var(--chip-texto); border-radius: 16px; padding: 6px 14px; font-size: 13px; cursor: pointer; }
    #accionesRapidas button:hover { background: var(--azul); color: #fff; }
    .menu-mas { position: fixed; top: 56px; right: 8px; background: var(--panel); border: 1px solid var(--borde); border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,.2); padding: 6px; display: flex; flex-direction: column; gap: 2px; z-index: 60; min-width: 210px; }
    .menu-mas button { border: none; background: transparent; color: var(--texto-ia); padding: 11px 14px; text-align: left; font-size: 14px; cursor: pointer; border-radius: 8px; white-space: nowrap; }
    .menu-mas button:hover { background: var(--chip); }
    .menu-mas button.activo { color: var(--azul); font-weight: 700; }

    /* Panel lateral de conversaciones */
    #fondoPanel {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 9;
    }
    #fondoPanel.abierto { opacity: 1; pointer-events: auto; }
    #panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      max-width: 80%;
      height: 100%;
      background: var(--panel);
      box-shadow: 2px 0 16px rgba(0,0,0,0.2);
      transform: translateX(-100%);
      transition: transform 0.25s;
      z-index: 10;
      display: flex;
      flex-direction: column;
    }
    #panel.abierto { transform: translateX(0); }
    #panel h3 { margin: 0; padding: 16px; font-size: 15px; border-bottom: 1px solid var(--borde); }
    #nuevaConv, #btnGaleria {
      margin: 12px;
      padding: 11px;
      background: var(--azul);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #btnGaleria { margin-top: 0; background: var(--chip); color: var(--texto-ia); border: 1px solid var(--borde); }
    #fondoGaleria { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; z-index: 14; }
    #fondoGaleria.abierto { display: flex; align-items: center; justify-content: center; padding: 16px; }
    #galeriaPanel { background: var(--panel); color: var(--texto-ia); width: 580px; max-width: 94%; max-height: 85vh; overflow: auto; border-radius: 16px; padding: 18px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
    .gal-cab { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .gal-cab h3 { margin: 0; font-size: 17px; }
    .gal-cab button { border: none; background: transparent; font-size: 20px; cursor: pointer; color: var(--texto-ia); }
    #galeriaGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
    #galeriaGrid img { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 10px; cursor: pointer; }
    #galeriaGrid .vacio { grid-column: 1 / -1; text-align: center; padding: 30px; opacity: 0.7; }
    #fondoFavoritos { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: none; z-index: 14; }
    #fondoFavoritos.abierto { display: flex; align-items: center; justify-content: center; padding: 16px; }
    #favoritosPanel { background: var(--panel); color: var(--texto-ia); width: 580px; max-width: 94%; max-height: 85vh; overflow: auto; border-radius: 16px; padding: 18px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
    #favoritosLista { display: flex; flex-direction: column; gap: 12px; }
    #favoritosLista .vacio { text-align: center; padding: 30px; opacity: 0.7; }
    .fav-card { background: var(--chip); border-radius: 12px; padding: 12px; }
    .fav-card .img-generada { max-width: 220px; }
    #listaConvs { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
    .conv {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .conv:hover { background: var(--chip); }
    .conv.activa { background: var(--chip); font-weight: 600; }
    .conv .nombre {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 14px;
    }
    .conv .borrar {
      background: none;
      border: none;
      color: #ff6b6b;
      cursor: pointer;
      font-size: 15px;
    }

    /* Menú de ajustes de voz */
    #fondoAjustes {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      z-index: 12;
    }
    #fondoAjustes.abierto { display: flex; align-items: center; justify-content: center; }
    #ajustes {
      background: var(--panel);
      color: var(--texto-ia);
      width: 340px;
      max-width: 90%;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    #ajustes h3 { margin: 0 0 14px; font-size: 17px; }
    #ajustes label { display: block; margin: 14px 0 6px; font-size: 14px; font-weight: 600; }
    #ajustes select, #ajustes input[type=range] {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--borde);
      background: var(--fondo);
      color: var(--texto-ia);
    }
    #ajustes input[type=range] { padding: 0; }
    .ajustes-botones { display: flex; gap: 8px; margin-top: 18px; }
    .ajustes-botones button {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #probarVoz { background: var(--chip); color: var(--chip-texto); }
    #cerrarAjustes { background: var(--azul); color: #fff; }

    /* Botón de copiar respuesta */
    .copiar-msg {
      display: block;
      margin-top: 8px;
      background: transparent;
      border: 1px solid var(--borde);
      color: var(--chip-texto);
      border-radius: 8px;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .copiar-msg:hover { background: var(--chip); }
  </style>
</head>
<body>
  <header>
    <button id="btnMenu" class="icono" title="Mis conversaciones">☰</button>
    <div class="titulo">
      <b>Asistente IA</b>
      <span>Creado por Samuel</span>
    </div>
    <div class="acciones">
      <button id="btnManosLibres" class="icono" title="Modo manos libres (hablar y escuchar)">🎙️</button>
      <button id="btnTema" class="icono" title="Modo claro/oscuro">🌙</button>
      <button id="btnMas" class="icono" title="Más opciones">⋮</button>
    </div>
  </header>

  <!-- Menú "⋮" con las opciones secundarias (cabecera más limpia) -->
  <div id="menuMas" class="menu-mas" style="display:none">
    <button id="btnInstalar" style="display:none">📲 Instalar app</button>
    <button id="btnVoz">🔇 Leer en voz alta</button>
    <button id="btnAjustes">⚙️ Ajustes</button>
    <button id="btnNuevoRapido">➕ Nueva conversación</button>
    <button id="btnFavoritos">⭐ Mis favoritos</button>
    <button id="btnWhatsapp">📲 Compartir por WhatsApp</button>
    <button id="btnCompartir">📤 Compartir (otras apps)</button>
    <button id="btnDescargarConv">📄 Descargar conversación (.txt)</button>
    <button id="btnPdf">📑 Exportar a PDF</button>
    <button id="btnPantalla">⛶ Pantalla completa</button>
  </div>

  <div id="mensajes"></div>
  <div id="ejemplos"></div>
  <div id="sugerencias"></div>

  <div id="previewFoto"></div>
  <div id="menuFoto" class="menu-foto" style="display:none">
    <button type="button" id="optCamara">📸 Tomar foto</button>
    <button type="button" id="optGaleria">🖼️ Desde galería</button>
  </div>
  <div id="accionesRapidas">
    <button type="button" id="btnResumir">📝 Resumir</button>
    <button type="button" id="btnTraducir">🌐 Traducir</button>
  </div>
  <form id="formulario">
    <input id="archivoFoto" type="file" accept="image/*" style="display:none" />
    <input id="archivoCamara" type="file" accept="image/*" capture="environment" style="display:none" />
    <button id="btnFoto" type="button" title="Subir o tomar una foto">📷</button>
    <textarea id="texto" rows="1" placeholder="Escribe tu mensaje...  (Enter envía · Shift+Enter nueva línea)" autocomplete="off"></textarea>
    <button id="micro" type="button" title="Hablar por voz">🎤</button>
    <button id="enviar" type="submit">Enviar</button>
  </form>

  <!-- Panel lateral de conversaciones -->
  <div id="fondoPanel"></div>
  <nav id="panel">
    <h3>💬 Mis conversaciones</h3>
    <button id="nuevaConv">➕ Nueva conversación</button>
    <button id="btnGaleria">🖼️ Mis imágenes</button>
    <input id="buscarConv" type="text" placeholder="🔍 Buscar conversación..." />
    <div id="listaConvs"></div>
  </nav>

  <!-- Galería de imágenes generadas -->
  <div id="fondoGaleria">
    <div id="galeriaPanel">
      <div class="gal-cab">
        <h3>🖼️ Mis imágenes</h3>
        <button id="cerrarGaleria" title="Cerrar">✕</button>
      </div>
      <div id="galeriaGrid"></div>
    </div>
  </div>

  <!-- Modal de favoritos -->
  <div id="fondoFavoritos">
    <div id="favoritosPanel">
      <div class="gal-cab">
        <h3>⭐ Mis favoritos</h3>
        <button id="cerrarFavoritos" title="Cerrar">✕</button>
      </div>
      <div id="favoritosLista"></div>
    </div>
  </div>

  <!-- Menú de ajustes de voz -->
  <div id="fondoAjustes">
    <div id="ajustes">
      <h3>⚙️ Ajustes</h3>
      <label for="selModo">🎭 Personalidad del asistente</label>
      <select id="selModo">
        <option value="amigable">😊 Amigable</option>
        <option value="chapin">🇬🇹 Chapín</option>
        <option value="tutor">🎓 Tutor de tareas</option>
        <option value="proyecto">🛠️ Modo Proyecto (te da todo el código)</option>
        <option value="profesor">👨‍🏫 Profesor</option>
        <option value="programador">💻 Programador</option>
        <option value="gracioso">😄 Gracioso</option>
      </select>
      <label for="selModelo">🧠 Cerebro (modelo de IA)</label>
      <select id="selModelo">
        <option value="rapido">⚡ Rápido (responde al instante) — recomendado</option>
        <option value="inteligente">🦉 Inteligente (mejor respuesta, más lento)</option>
      </select>
      <label for="selEstilo">🎨 Estilo de las imágenes</label>
      <select id="selEstilo">
        <option value="">🖼️ Normal</option>
        <option value="photorealistic, realistic, high detail">📷 Realista</option>
        <option value="cartoon style, colorful">🎨 Caricatura</option>
        <option value="anime style">🌸 Anime</option>
        <option value="pixel art, 8-bit">👾 Pixel art</option>
        <option value="watercolor painting">🖌️ Acuarela</option>
        <option value="pencil sketch, black and white">✏️ Bosquejo</option>
      </select>
      <hr style="border:none;border-top:1px solid var(--borde);margin:16px 0;" />
      <label for="selVoz">🎙️ Voz</label>
      <select id="selVoz"></select>
      <label>Velocidad: <span id="valVel"></span></label>
      <input id="sliderVel" type="range" min="0.5" max="1.4" step="0.02" />
      <label>Tono: <span id="valTono"></span></label>
      <input id="sliderTono" type="range" min="0.6" max="1.6" step="0.02" />
      <div class="ajustes-botones">
        <button id="probarVoz">🔊 Probar</button>
        <button id="cerrarAjustes">Listo</button>
      </div>
    </div>
  </div>

  <script>
    const mensajes = document.getElementById("mensajes");
    const ejemplos = document.getElementById("ejemplos");
    const formulario = document.getElementById("formulario");
    const texto = document.getElementById("texto");
    const enviar = document.getElementById("enviar");
    const micro = document.getElementById("micro");
    const btnTema = document.getElementById("btnTema");
    const btnVoz = document.getElementById("btnVoz");
    const btnManosLibres = document.getElementById("btnManosLibres");
    const btnPantalla = document.getElementById("btnPantalla");
    const btnNuevoRapido = document.getElementById("btnNuevoRapido");
    const btnAjustes = document.getElementById("btnAjustes");
    const btnCompartir = document.getElementById("btnCompartir");
    const selModo = document.getElementById("selModo");
    const selModelo = document.getElementById("selModelo");
    const fondoAjustes = document.getElementById("fondoAjustes");
    const selVoz = document.getElementById("selVoz");
    const sliderVel = document.getElementById("sliderVel");
    const sliderTono = document.getElementById("sliderTono");
    const valVel = document.getElementById("valVel");
    const valTono = document.getElementById("valTono");
    const probarVoz = document.getElementById("probarVoz");
    const cerrarAjustes = document.getElementById("cerrarAjustes");
    const btnMenu = document.getElementById("btnMenu");
    const panel = document.getElementById("panel");
    const fondoPanel = document.getElementById("fondoPanel");
    const nuevaConv = document.getElementById("nuevaConv");
    const listaConvs = document.getElementById("listaConvs");
    const sugerencias = document.getElementById("sugerencias");
    const buscarConv = document.getElementById("buscarConv");

    const CLAVE_CONVS = "conversaciones";
    const CLAVE_ACTUAL = "conversacion-actual";
    const CLAVE_MODO = "modo-asistente";
    const CLAVE_MODELO = "modelo-asistente";
    const PREGUNTAS = [
      "Escríbeme un ejemplo de código en Go 💻",
      "🎨 Imagen de un gato bonito",
      "🖼️ Dibuja un dragón rojo",
      "Dame una idea para un proyecto",
      "Cuéntame un chiste de programadores 😄",
    ];

    // ---------- Conversaciones (#6) ----------
    function convActual() {

    function cargarTodo() {
      try {
        const g = JSON.parse(localStorage.getItem(CLAVE_CONVS) || "[]");
        if (Array.isArray(g)) conversaciones = g;
      } catch (e) {}
      idActual = localStorage.getItem(CLAVE_ACTUAL);
      if (!conversaciones.length || !convActual()) {

      } else {
        render();
      }

    function crearNueva() {
      const conv = { id: nuevoId(), titulo: "Nueva conversación", mensajes: [] };
      conversaciones.unshift(conv);
      idActual = conv.id;
      guardarTodo();
      render();
      pintarLista();

    function seleccionar(id) {

    function renombrar(id, ev) {
      ev.stopPropagation();
      const c = conversaciones.find((x) => x.id === id);
      if (!c) return;
      const nuevo = prompt("✏️ Nuevo nombre para esta conversación:", c.titulo);
      if (nuevo === null) return; // canceló
      const limpio = nuevo.trim();
      if (!limpio) return;
      c.titulo = limpio.slice(0, 40);
      c.tituloManual = true; // para que el auto-título no lo pise
      guardarTodo();
      pintarLista();
    }
    function borrar(id, ev) {
      ev.stopPropagation();
      conversaciones = conversaciones.filter((c) => c.id !== id);
      if (idActual === id) {
        if (conversaciones.length) idActual = conversaciones[0].id;
        else { crearNueva(); return; }
      }
      guardarTodo();
      render();
      pintarLista();

    function abrirPanel() { panel.classList.add("abierto"); fondoPanel.classList.add("abierto"); }
    function cerrarPanel() { panel.classList.remove("abierto"); fondoPanel.classList.remove("abierto"); }

    // ---------- Formato del texto (#1 código bonito) ----------
    function escaparHTML(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function formatear(raw) {
      let s = escaparHTML(raw);
      const bloques = [];
      // Bloques de código → cada uno en su propia línea (marcador BLOQUEn).
      s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
        bloques.push(code.replace(/\n+$/, ""));
        return "\nBLOQUE" + (bloques.length - 1) + "\n";
      });
      // Código en línea y negrita.
      s = s.replace(/`([^`]+)`/g, '<code class="inline">$1</code>');
      s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      // Procesar línea por línea: títulos, listas, texto. (#A mejor formato)
      s = s.split("\n").map((linea) => {
        let m;
        if ((m = linea.match(/^BLOQUE(\d+)$/))) {
          return '<div class="codigo"><button class="copiar" onclick="copiarCodigo(this)">Copiar</button>' +
            '<pre><code>' + bloques[m[1]] + '</code></pre></div>';
        }
        if ((m = linea.match(/^\s*###\s+(.*)/))) return '<div class="t3">' + m[1] + "</div>";
        if ((m = linea.match(/^\s*##\s+(.*)/))) return '<div class="t2">' + m[1] + "</div>";
        if ((m = linea.match(/^\s*#\s+(.*)/))) return '<div class="t1">' + m[1] + "</div>";
        if ((m = linea.match(/^\s*[-*]\s+(.*)/))) return '<div class="li">• ' + m[1] + "</div>";
        if ((m = linea.match(/^\s*(\d+)\.\s+(.*)/))) return '<div class="li">' + m[1] + ". " + m[2] + "</div>";
        if (linea.trim() === "") return "";
        return linea + "<br>";
      }).join("");
      return s;
    }
    function copiarCodigo(btn) {
      const code = btn.parentElement.querySelector("code").textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = "¡Copiado!";
        setTimeout(() => (btn.textContent = "Copiar"), 1500);
      });
    }

    // #C — hora del mensaje (HH:MM).
    function horaActual() {
      return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }
    function agregarHora(div, hora) {
      if (!hora) return;
      const h = document.createElement("div");
      h.className = "hora";
      h.textContent = hora;
      div.appendChild(h);
    }

    // Pone la respuesta de la IA con formato + botón "Copiar" (#B) + hora (#C).
    function ponerContenidoIA(div, texto, hora) {
      div.innerHTML = formatear(texto);
      const btn = document.createElement("button");
      btn.className = "copiar-msg";
      btn.textContent = "📋 Copiar";
      btn.onclick = () => {
        navigator.clipboard.writeText(texto).then(() => {
          btn.textContent = "✅ ¡Copiado!";
          setTimeout(() => (btn.textContent = "📋 Copiar"), 1500);
        });
      };
      div.appendChild(btn);
      div.appendChild(botonFav({ clave: texto, tipo: "texto", contenido: texto }));
      agregarHora(div, hora);
    }

    function pintar(rol, contenido, hora, imagen) {
      const div = document.createElement("div");
      div.className = "burbuja " + (rol === "user" ? "yo" : "ia");
      if (rol === "user") {
        if (contenido) {
          const t = document.createElement("div");
          t.textContent = contenido;
          div.appendChild(t);
        }
        if (imagen) {
          const img = document.createElement("img");
          img.src = imagen;
          img.className = "img-generada";
          div.appendChild(img);
        }
        agregarHora(div, hora);
      } else if (contenido === "…") {
        div.innerHTML = "…";
      } else {
        ponerContenidoIA(div, contenido, hora);
      }
      mensajes.appendChild(div);
      mensajes.scrollTop = mensajes.scrollHeight;
      return div;
    }

    // Muestra una imagen generada por IA, con su texto encima.
    function pintarImagen(texto, url, hora) {
      const div = document.createElement("div");
      div.className = "burbuja ia";
      if (texto) {
        const cap = document.createElement("div");

    // Descarga la imagen al dispositivo (la baja como archivo .jpg).
    function descargarImagen(url) {
      fetch(url)
        .then((r) => r.blob())
        .then((blob) => {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = "imagen-ia.jpg";
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(a.href);
        })
        .catch(() => window.open(url, "_blank")); // respaldo: abrir en pestaña
    }

    // Comparte una imagen generada por WhatsApp / otras apps del teléfono.
    async function compartirImagen(url) {
      try {
        const blob = await (await fetch(url)).blob();
        const archivo = new File([blob], "imagen-ia.jpg", { type: blob.type || "image/jpeg" });
        // Lo mejor: compartir el archivo de imagen directo (móvil moderno).
        if (navigator.canShare && navigator.canShare({ files: [archivo] })) {
          await navigator.share({ files: [archivo], title: "Imagen de mi Asistente IA" });
          return;
        }
        // Si no se puede el archivo, comparte al menos el enlace.
        if (navigator.share) {
          await navigator.share({ title: "Imagen de mi Asistente IA", text: "Mira esta imagen 🎨", url });
          return;
        }
        // Respaldo final (PC sin compartir): descargar para enviarla a mano.
        descargarImagen(url);
        alert("Imagen descargada 💾. Ya puedes adjuntarla en WhatsApp u otra app.");
      } catch (e) {
        if (e && e.name === "AbortError") return; // el usuario canceló
        descargarImagen(url);
      }
    }

    // Si el mensaje pide una imagen ("imagen de un gato", "dibuja…"), devuelve
    // el TEMA. Si no pide imagen, devuelve null.
    function temaDeImagen(texto) {
      const t = texto.toLowerCase().trim();
      if (!/\b(imagen|im[áa]genes|foto|fotos|fotograf[íi]a|dib[uú]j|il[uú]stra)/.test(t)) return null;
      const m = t.match(/\bde(?:\s+(?:la|el|los|las)\b)?\s+(.+)$/);
      let tema;
      if (m) {
        tema = m[1];
      } else {
        tema = t.replace(/\b(ponme|p[oó]n|hazme|haz|dame|mu[eé]strame|ens[eé][ñn]ame|gen[eé]ra(?:me)?|cr[eé]a(?:me)?|dib[uú]ja(?:me)?|il[uú]stra(?:me)?|quiero|una|un|unos|unas|por favor|porfa|imagen|im[áa]genes|foto|fotos|fotograf[íi]a)\b/g, " ");
      }
      tema = tema.replace(/\s+/g, " ").trim();
      return tema || null;
    }

    function accionRapida(tipo) {

      if (!base) {
        const h = historial();
        const ultimaIA = [...h].reverse().find(
          (m) => m.role === "assistant" && m.content && !m.imageUrl

    const CLAVE_FAVS = "favoritos-asistente";

    function guardarFavs() { localStorage.setItem(CLAVE_FAVS, JSON.stringify(favoritos)); }
    function esFav(clave) { return favoritos.some((f) => f.clave === clave); }
    function alternarFav(item, btn) {
      const i = favoritos.findIndex((f) => f.clave === item.clave);
      if (i >= 0) favoritos.splice(i, 1);
      else favoritos.unshift(item);
      guardarFavs();
      if (btn) btn.textContent = esFav(item.clave) ? "⭐ Guardado" : "☆ Favorito";

    btnFavoritos.addEventListener("click", abrirFavoritos);
    cerrarFavoritos.addEventListener("click", () => fondoFavoritos.classList.remove("abierto"));
    fondoFavoritos.addEventListener("click", (e) => {
      if (e.target === fondoFavoritos) fondoFavoritos.classList.remove("abierto");
    });

    // ----- Instalable (PWA): service worker + botón "Instalar app" -----
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      });
    }
    const btnInstalar = document.getElementById("btnInstalar");
    let promptInstalar = null;
    window.addEventListener("beforeinstallprompt", (e) => {
      e.preventDefault();
      promptInstalar = e;
      btnInstalar.style.display = "block"; // ya se puede instalar: mostramos el botón
    });
    btnInstalar.addEventListener("click", async () => {
      if (!promptInstalar) return;
      promptInstalar.prompt();
      await promptInstalar.userChoice;
      promptInstalar = null;
      btnInstalar.style.display = "none";
    });
    window.addEventListener("appinstalled", () => {
      promptInstalar = null;
      btnInstalar.style.display = "none";
    });

    function mostrarPreviewFoto() {
      previewFoto.innerHTML = "";
      if (!imagenPendiente) return;
      const img = document.createElement("img");
      img.src = imagenPendiente;
      const x = document.createElement("button");
      x.className = "quitar-foto";
      x.textContent = "✕";
      x.title = "Quitar foto";
      x.onclick = () => { imagenPendiente = null; mostrarPreviewFoto(); };
      previewFoto.appendChild(img);
      previewFoto.appendChild(x);
    }

    // Reduce la foto (máx maxLado px) y la pasa a base64 JPEG, para que no pese.
    function comprimirImagen(file, maxLado, calidad) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            if (w > h && w > maxLado) { h = Math.round(h * maxLado / w); w = maxLado; }
            else if (h > maxLado) { w = Math.round(w * maxLado / h); h = maxLado; }
            const canvas = document.createElement("canvas");
            canvas.width = w; canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL("image/jpeg", calidad));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // Vuelve a dibujar la conversación actual.
    function render() {
      mensajes.innerHTML = "";
      const h = historial();
      if (h.length === 0) {
        pintar("assistant", "¡Hola! Soy tu asistente. ¿En qué te ayudo? 🙂");
        mostrarEjemplos();
      } else {
        ejemplos.innerHTML = "";
        h.forEach((m) => m.imageUrl ? pintarImagen(m.content, m.imageUrl, m.hora) : pintar(m.role, m.content, m.hora, m.imagen));
      }
    }

    function mostrarEjemplos() {
      ejemplos.innerHTML = "";
      PREGUNTAS.forEach((p) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = p;
        chip.addEventListener("click", () => enviarMensaje(p));
        ejemplos.appendChild(chip);
      });
    }

    // #A — Preguntas sugeridas + #B — Regenerar (tras cada respuesta).
    const SUGERENCIAS = [
      { etiqueta: "📝 Dame un ejemplo", texto: "Dame un ejemplo" },
      { etiqueta: "🔁 Explícamelo más simple", texto: "Explícamelo más simple" },
      { etiqueta: "➡️ ¿Qué más?", texto: "¿Qué más me puedes decir sobre esto?" },
    ];
    function limpiarSugerencias() {
      sugerencias.innerHTML = "";
    }
    function mostrarSugerencias() {
      sugerencias.innerHTML = "";
      SUGERENCIAS.forEach((s) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = s.etiqueta;
        chip.addEventListener("click", () => enviarMensaje(s.texto));
        sugerencias.appendChild(chip);
      });
      // Botón regenerar
      const reg = document.createElement("div");
      reg.className = "chip";
      reg.textContent = "🔄 Otra respuesta";
      reg.addEventListener("click", regenerar);
      sugerencias.appendChild(reg);
      // Botón editar tu última pregunta
      const edit = document.createElement("div");
      edit.className = "chip";
      edit.textContent = "✏️ Editar mi pregunta";
      edit.addEventListener("click", editarUltimo);
      sugerencias.appendChild(edit);
    }

    // Devuelve la última pregunta al campo de texto para corregirla y reenviarla.
    function editarUltimo() {
      if (cargando) return;
      const h = historial();
      if (!h.length) return;
      if (h[h.length - 1].role === "assistant") h.pop(); // quita la respuesta
      const ultimoUser = h.length ? h[h.length - 1] : null;
      if (!ultimoUser || ultimoUser.role !== "user") return;
      h.pop(); // quita la pregunta (la editas y se reenvía)
      guardarTodo();
      render();
      texto.value = ultimoUser.content;
      ajustarAlto();
      texto.focus();
    }

    // #B — Regenerar la última respuesta (vuelve a preguntar lo mismo).
    function regenerar() {
      if (cargando) return;
      const h = historial();
      if (!h.length) return;
      if (h[h.length - 1].role === "assistant") h.pop(); // quita la respuesta
      const ultimoUser = h.length ? h[h.length - 1] : null;
      if (!ultimoUser || ultimoUser.role !== "user") return;
      h.pop(); // enviarMensaje lo vuelve a añadir
      guardarTodo();
      render();
      enviarMensaje(ultimoUser.content);
    }

    // ---------- Voz (#3) ----------
    // ---------- Voz: configuración guardada por el usuario ----------
    const CLAVE_VOZ = "ajustes-voz";
    let configVoz = { nombre: null, rate: 0.9, pitch: 1.1 };
    try {
      const g = JSON.parse(localStorage.getItem(CLAVE_VOZ) || "null");
      if (g) configVoz = g;
    } catch (e) {}

    function vocesEs() {
      const voces = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      const es = voces.filter((v) => v.lang && v.lang.toLowerCase().startsWith("es"));
      return es.length ? es : voces;
    }
    function vozPorDefecto() {
      const es = vocesEs();
      return (
        es.find((v) => /mónica|monica|paulina|marisol|lucia|esperanza|sabina|female|mujer/i.test(v.name)) ||
        es[0] || null
      );
    }
    function vozActual() {
      const voces = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      return voces.find((v) => v.name === configVoz.nombre) || vozPorDefecto();
    }
    function limpiarParaVoz(t) {
      return t
        .replace(/```[\s\S]*?```/g, " código ")
        .replace(/[*`#_]/g, "")
        .replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE0F}\u{200D}\u{1F3FB}-\u{1F3FF}]/gu, "");
    }
    function decir(texto) {
      if (!window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance(limpiarParaVoz(texto));
      u.lang = "es-ES";
      const v = vozActual();
      if (v) u.voice = v;
      u.rate = configVoz.rate;
      u.pitch = configVoz.pitch;
      hablando = true;
      // Al terminar de hablar, en modo manos libres vuelve a escuchar.
      u.onend = () => { hablando = false; iniciarEscucha(); };
      u.onerror = () => { hablando = false; iniciarEscucha(); };
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }
    function hablar(t) {
      if (leerEnVoz) decir(t);
    }

    // ---------- Menú de ajustes de voz ----------
    function poblarVoces() {
      if (!selVoz) return;
      const voces = vocesEs();
      selVoz.innerHTML = "";
      voces.forEach((v) => {
        const op = document.createElement("option");
        op.value = v.name;
        op.textContent = v.name + (v.lang ? " (" + v.lang + ")" : "");
        if (v.name === configVoz.nombre) op.selected = true;
        selVoz.appendChild(op);
      });
      if (!configVoz.nombre) {
        const def = vozPorDefecto();
        if (def) { configVoz.nombre = def.name; selVoz.value = def.name; }
      }
    }
    function refrescarLabels() {
      sliderVel.value = configVoz.rate;
      sliderTono.value = configVoz.pitch;
      valVel.textContent = configVoz.rate.toFixed(2);
      valTono.textContent = configVoz.pitch.toFixed(2);
    }
    function guardarVoz() { localStorage.setItem(CLAVE_VOZ, JSON.stringify(configVoz)); }

    if (window.speechSynthesis) {
      poblarVoces();
      refrescarLabels();
      window.speechSynthesis.onvoiceschanged = poblarVoces;
    }

    btnAjustes.addEventListener("click", () => {
      poblarVoces();
      refrescarLabels();
      fondoAjustes.classList.add("abierto");
    });
    cerrarAjustes.addEventListener("click", () => fondoAjustes.classList.remove("abierto"));
    fondoAjustes.addEventListener("click", (e) => {
      if (e.target === fondoAjustes) fondoAjustes.classList.remove("abierto");
    });
    selVoz.addEventListener("change", () => { configVoz.nombre = selVoz.value; guardarVoz(); });
    sliderVel.addEventListener("input", () => {
      configVoz.rate = parseFloat(sliderVel.value);
      valVel.textContent = configVoz.rate.toFixed(2);
      guardarVoz();
    });
    sliderTono.addEventListener("input", () => {
      configVoz.pitch = parseFloat(sliderTono.value);
      valTono.textContent = configVoz.pitch.toFixed(2);
      guardarVoz();
    });
    probarVoz.addEventListener("click", () =>
      decir("Hola, soy tu asistente. Así sueno con esta configuración.")
    );

    // ---------- Botón parar (#5) ----------
    function modoCargando(activo) {
      cargando = activo;
      enviar.textContent = activo ? "⏹ Parar" : "Enviar";
      enviar.classList.toggle("parar", activo);
    }

    // ---------- Comandos: abrir cursos/páginas ----------
    function quitarAcentos(s) {
      return s.normalize("NFD").replace(/[̀-ͯ]/g, "");
    }
    const CURSOS = [
      { re: /mecanograf|teclado|escribir rapido/, url: "https://www.mecanografia-online.com/", nombre: "un curso de mecanografía ⌨️" },
      { re: /\bflutter\b|\bdart\b/, url: "https://docs.flutter.dev/", nombre: "la documentación de Flutter 📱" },
      { re: /\bgolang\b|\bgo\b/, url: "https://go.dev/learn/", nombre: "recursos para aprender Go 💻" },
      { re: /\bpython\b/, url: "https://www.python.org/about/gettingstarted/", nombre: "recursos para aprender Python 🐍" },
    ];
    function detectarCurso(texto) {
      const t = quitarAcentos(texto.toLowerCase());
      const pideAbrir = /(abre|abreme|abrir|curso de|quiero aprender|ensename|aprender)/.test(t);
      if (!pideAbrir) return null;
      return CURSOS.find((c) => c.re.test(t)) || null;
    }

    async function enviarMensaje(contenido, saltarComandos) {
      contenido = contenido.trim();
      const foto = imagenPendiente;
      if ((!contenido && !foto) || cargando) return;

      ejemplos.innerHTML = "";
      limpiarSugerencias();
      const horaUser = horaActual();
      pintar("user", contenido, horaUser, foto);
      const msgUser = { role: "user", content: contenido, hora: horaUser };
      if (foto) msgUser.imagen = foto;
      historial().push(msgUser);
      // Ya se mandó la foto: limpiamos la vista previa.
      imagenPendiente = null;
      mostrarPreviewFoto();
      // El título de la conversación = primer mensaje del usuario (salvo que el usuario ya lo haya renombrado).
      if (convActual() && convActual().mensajes.length === 1 && !convActual().tituloManual) {
        convActual().titulo = (contenido || "📷 Foto").slice(0, 30);
        pintarLista();
      }
      guardarTodo();
      texto.value = "";
      ajustarAlto();

      // Si NO hay foto adjunta (ni venimos de un botón rápido), revisamos
      // comandos de curso e imágenes generadas.
      if (!foto && !saltarComandos) {
        // ¿Es un comando para abrir un curso/página?
        const curso = detectarCurso(contenido);
        if (curso) {
          window.open(curso.url, "_blank");
          const conf = "¡Listo! Te he abierto " + curso.nombre + " en una pestaña nueva. 👍";
          pintar("assistant", conf);
          historial().push({ role: "assistant", content: conf });
          guardarTodo();
          hablar(conf);
          texto.focus();
          return;
        }

        // ¿Pide una imagen? → la generamos y mostramos (sin molestar a la IA).
        const temaImg = temaDeImagen(contenido);
        if (temaImg) {
          const prompt = estiloElegido ? (temaImg + ", " + estiloElegido) : temaImg;
          const url = "https://image.pollinations.ai/prompt/" + encodeURIComponent(prompt);
          const horaImg = horaActual();
          const cap = 'Aquí tienes una imagen de "' + temaImg + '" 🎨';
          pintarImagen(cap, url, horaImg);
          historial().push({ role: "assistant", content: cap, imageUrl: url, hora: horaImg });
          guardarTodo();
          hablar(cap); // en manos libres, anuncia la imagen y vuelve a escuchar
          texto.focus();
          return;
        }
      }

      modoCargando(true);
      const pensando = pintar("assistant", "…");
      let acumulado = "";
      aborto = new AbortController();

      try {
        const resp = await fetch("/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: historial(), modo: modoElegido, modelo: modeloElegido }),
          signal: aborto.signal,
        });
        const lector = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let errorMsg = "";

        while (true) {
          const { done, value } = await lector.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const partes = buffer.split("\n\n");
          buffer = partes.pop();
          for (const parte of partes) {
            const linea = parte.split("\n").find((l) => l.startsWith("data: "));
            if (!linea) continue;
            const data = linea.slice(6);
            if (data === "[DONE]") continue;
            try {
              const obj = JSON.parse(data);
              if (obj.error) errorMsg = obj.error;
              else if (obj.t) {
                acumulado += obj.t;
                pensando.textContent = acumulado;
                mensajes.scrollTop = mensajes.scrollHeight;
              }
            } catch (e) {}
          }
        }

        if (errorMsg) {
          pensando.textContent = "⚠️ " + errorMsg;
        } else {
          const horaIA = horaActual();
          ponerContenidoIA(pensando, acumulado, horaIA);
          historial().push({ role: "assistant", content: acumulado, hora: horaIA });
          guardarTodo();
          hablar(acumulado);
          mostrarSugerencias(); // preguntas sugeridas y regenerar
        }
      } catch (err) {
        if (err.name === "AbortError") {
          // El usuario pulsó "parar": guardamos lo que llegó.
          if (acumulado) {
            ponerContenidoIA(pensando, acumulado);
            historial().push({ role: "assistant", content: acumulado });
            guardarTodo();
          } else {
            pensando.remove();
          }
        } else {
          pensando.textContent = "⚠️ No se pudo conectar con el servidor.";
        }
      } finally {
        modoCargando(false);
        texto.focus();
        // Manos libres: si no se habló (p. ej. un error), reactiva la escucha.
        if (modoVoz && !hablando) setTimeout(iniciarEscucha, 600);
      }
    }

    // ---------- Eventos ----------
    // El textarea crece solo con el texto (hasta un máximo); al vaciarlo, vuelve a 1 línea.
    function ajustarAlto() {
      texto.style.height = "auto";
      texto.style.height = Math.min(texto.scrollHeight, 140) + "px";
    }
    texto.addEventListener("input", ajustarAlto);
    // En PC: Enter = enviar, Shift+Enter = nueva línea.
    // En móvil (pantalla táctil): Enter = nueva línea, y se envía con el botón ▶.
    const esTactil = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;
    texto.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey && !esTactil) {
        e.preventDefault();
        if (!cargando) enviarMensaje(texto.value);
      }
    });
    formulario.addEventListener("submit", (e) => {
      e.preventDefault();
      if (cargando) {
        if (aborto) aborto.abort(); // botón en modo "parar"
      } else {
        enviarMensaje(texto.value);
      }
    });

    btnMenu.addEventListener("click", abrirPanel);
    fondoPanel.addEventListener("click", cerrarPanel);
    buscarConv.addEventListener("input", pintarLista); // #D — buscar
    nuevaConv.addEventListener("click", () => { crearNueva(); cerrarPanel(); });
    btnNuevoRapido.addEventListener("click", () => crearNueva());

    // #A — Personalidad del asistente
    selModo.value = modoElegido;
    selModo.addEventListener("change", () => {
      modoElegido = selModo.value;
      localStorage.setItem(CLAVE_MODO, modoElegido);
    });

    // #B — Cerebro (modelo de IA)
    selModelo.value = modeloElegido;
    selModelo.addEventListener("change", () => {
      modeloElegido = selModelo.value;
      localStorage.setItem(CLAVE_MODELO, modeloElegido);
    });

    const selEstilo = document.getElementById("selEstilo");
    selEstilo.value = estiloElegido;
    selEstilo.addEventListener("change", () => {
      estiloElegido = selEstilo.value;
      localStorage.setItem(CLAVE_ESTILO, estiloElegido);
    });

    // #C — Compartir la conversación
    btnCompartir.addEventListener("click", async () => {
      const h = historial();
      if (!h.length) {
        alert("Escribe algo primero para poder compartir la conversación. 🙂");
        return;
      }
      const texto = h
        .map((m) => (m.role === "user" ? "🧑 Yo: " : "🤖 Asistente: ") + m.content)
        .join("\n\n");
      const completo = "💬 Conversación con mi Asistente IA\n\n" + texto;
      try {
        if (navigator.share) {
          await navigator.share({ title: "Asistente IA", text: completo });
        } else {
          await navigator.clipboard.writeText(completo);
          alert("¡Conversación copiada! 📋 Ya puedes pegarla donde quieras.");
        }
      } catch (e) {}
    });

    btnTema.addEventListener("click", () => {
      document.body.classList.toggle("oscuro");
      btnTema.textContent = document.body.classList.contains("oscuro") ? "☀️" : "🌙";
    });

    // Pantalla completa
    btnPantalla.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        btnPantalla.classList.add("activo");
      } else {
        document.exitFullscreen();
        btnPantalla.classList.remove("activo");
      }
    });
    document.addEventListener("fullscreenchange", () => {
      btnPantalla.classList.toggle("activo", !!document.fullscreenElement);
    });

    function actualizarLabelVoz() {
      btnVoz.textContent = leerEnVoz ? "🔊 Voz: activada" : "🔇 Leer en voz alta";
      btnVoz.classList.toggle("activo", leerEnVoz);
    }
    btnVoz.addEventListener("click", () => {
      leerEnVoz = !leerEnVoz;
      actualizarLabelVoz();
      if (!leerEnVoz && window.speechSynthesis) window.speechSynthesis.cancel();
    });
    actualizarLabelVoz();

    const Reconocimiento = window.SpeechRecognition || window.webkitSpeechRecognition;

    // En modo manos libres, vuelve a escuchar si no estamos ocupados ni hablando.
    function iniciarEscucha() {
      if (!rec || !modoVoz || cargando || hablando) return;
      try { micro.classList.add("grabando"); rec.start(); } catch (e) {}
    }

    if (Reconocimiento) {
      rec = new Reconocimiento();
      rec.lang = "es-ES";
      rec.onresult = (e) => {
        const dicho = e.results[0][0].transcript;
        texto.value = dicho;
        ajustarAlto();
        micro.classList.remove("grabando");
        if (modoVoz) {
          enviarMensaje(dicho); // manos libres: se envía solo
        } else {
          texto.focus();
        }
      };
      rec.onend = () => micro.classList.remove("grabando");
      rec.onerror = (e) => {
        micro.classList.remove("grabando");
        // Si solo fue una pausa (sin permiso denegado), sigue escuchando.
        if (modoVoz && e.error !== "not-allowed" && e.error !== "service-not-allowed") {
          setTimeout(iniciarEscucha, 800);
        }
      };
      micro.addEventListener("click", () => {
        try { micro.classList.add("grabando"); rec.start(); }
        catch (e) { micro.classList.remove("grabando"); }
      });
    } else {
      micro.style.display = "none";
    }

    // Botón de manos libres: activa/desactiva el modo voz continuo.
    btnManosLibres.addEventListener("click", () => {
      if (!Reconocimiento) { alert("Tu navegador no permite el micrófono para esto 😕"); return; }
      modoVoz = !modoVoz;
      btnManosLibres.classList.toggle("activo", modoVoz);
      if (modoVoz) {
        leerEnVoz = true; // en manos libres siempre lee las respuestas
        actualizarLabelVoz();
        iniciarEscucha();
      } else {
        try { rec.stop(); } catch (e) {}
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        micro.classList.remove("grabando");
      }
    });

    // Arranque
    cargarTodo();
  </script>
</body>
