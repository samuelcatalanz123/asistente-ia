<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente IA</title>
  <style>
    :root { --azul: #1a73e8; --gris: #f1f3f4; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      background: var(--azul);
      color: #fff;
      padding: 16px;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
    }
    #mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .burbuja {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 16px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .yo { align-self: flex-end; background: var(--azul); color: #fff; border-bottom-right-radius: 4px; }
    .ia { align-self: flex-start; background: var(--gris); color: #202124; border-bottom-left-radius: 4px; }
    form {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #e0e0e0;
      background: #fff;
    }
    #texto {
      flex: 1;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
    }
    #texto:focus { border-color: var(--azul); }
    button {
      background: var(--azul);
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 0 20px;
      font-size: 15px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>Asistente IA</header>
  <div id="mensajes">
    <div class="burbuja ia">¡Hola! Soy tu asistente. Escríbeme una pregunta. 🙂</div>
  </div>
  <form id="formulario">
    <input id="texto" type="text" placeholder="Escribe tu mensaje..." autocomplete="off" />
    <button id="enviar" type="submit">Enviar</button>
  </form>

  <script>
    const mensajes = document.getElementById("mensajes");
    const formulario = document.getElementById("formulario");
    const texto = document.getElementById("texto");
    const enviar = document.getElementById("enviar");

    // Historial de la conversación que se envía al servidor.
    const historial = [];

    function pintar(rol, contenido) {
      const div = document.createElement("div");
      div.className = "burbuja " + (rol === "user" ? "yo" : "ia");
      div.textContent = contenido;
      mensajes.appendChild(div);
      mensajes.scrollTop = mensajes.scrollHeight;
      return div;
    }

    formulario.addEventListener("submit", async (e) => {
      e.preventDefault();
      const contenido = texto.value.trim();
      if (!contenido) return;

      pintar("user", contenido);
      historial.push({ role: "user", content: contenido });
      texto.value = "";
      enviar.disabled = true;

      const pensando = pintar("assistant", "…");

      try {
        const resp = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: historial }),
        });
        const datos = await resp.json();
        if (resp.ok) {
          pensando.textContent = datos.reply;
          historial.push({ role: "assistant", content: datos.reply });
        } else {
          pensando.textContent = "⚠️ " + (datos.error || "Algo salió mal.");
        }
      } catch (err) {
        pensando.textContent = "⚠️ No se pudo conectar con el servidor.";
      } finally {
        enviar.disabled = false;
        texto.focus();
      }
    });
  </script>
</body>
</html>
