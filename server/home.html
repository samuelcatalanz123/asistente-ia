<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asistente IA</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <meta name="theme-color" content="#1a73e8" />
  <meta name="mobile-web-app-capable" content="yes" />
  <style>
    :root {
      --azul: #1a73e8;
      --azul-osc: #1557b0;
      --fondo: #f4f6fb;
      --cabecera: linear-gradient(135deg, #1a73e8, #6c4ee0);
      --burbuja-ia: #ffffff;
      --texto-ia: #1f2733;
      --texto-yo: #ffffff;
      --barra: #ffffff;
      --borde: #e2e6ee;
      --chip: #eef1f8;
      --chip-texto: #1a73e8;
      --codigo-fondo: #1e1e2e;
      --codigo-texto: #e7e7f0;
      --panel: #ffffff;
      --sombra: 0 2px 10px rgba(0,0,0,0.06);
    }
    body.oscuro {
      --fondo: #0f1420;
      --burbuja-ia: #1c2333;
      --texto-ia: #e7ebf3;
      --barra: #161c29;
      --borde: #2a3346;
      --chip: #1c2333;
      --chip-texto: #7aa7ff;
      --panel: #161c29;
      --sombra: 0 2px 10px rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      background: var(--fondo);
      color: var(--texto-ia);
      display: flex;
      flex-direction: column;
      height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    header {
      background: var(--cabecera);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: var(--sombra);
      z-index: 2;
    }
    .titulo { display: flex; flex-direction: column; flex: 1; }
    .titulo b { font-size: 18px; font-weight: 700; }
    .titulo span { font-size: 12px; opacity: 0.9; margin-top: 2px; }
    .acciones { display: flex; gap: 8px; }
    .icono {
      background: rgba(255,255,255,0.18);
      border: none;
      color: #fff;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      font-size: 17px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .icono:hover { background: rgba(255,255,255,0.32); }
    .icono.activo { background: #ffd166; color: #1f2733; }

    #mensajes {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .burbuja {
      max-width: 80%;
      padding: 11px 15px;
      border-radius: 18px;
      line-height: 1.45;
      word-wrap: break-word;
      box-shadow: var(--sombra);
      animation: aparecer 0.25s ease;
    }
    @keyframes aparecer {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .yo {
      align-self: flex-end;
      background: var(--azul);
      color: var(--texto-yo);
      border-bottom-right-radius: 5px;
      white-space: pre-wrap;
    }
    .ia {
      align-self: flex-start;
      background: var(--burbuja-ia);
      color: var(--texto-ia);
      border-bottom-left-radius: 5px;
    }
    .codigo { position: relative; margin: 8px 0; }
    .codigo pre {
      background: var(--codigo-fondo);
      color: var(--codigo-texto);
      padding: 14px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 0;
      font-size: 13.5px;
    }
    .codigo code { font-family: "SF Mono", Menlo, Consolas, monospace; }
    .copiar {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 12px;
      cursor: pointer;
    }
    .copiar:hover { background: rgba(255,255,255,0.3); }
    .ia .t1 { font-size: 18px; font-weight: 700; margin: 9px 0 4px; }
    .ia .t2 { font-size: 16px; font-weight: 700; margin: 8px 0 4px; }
    .ia .t3 { font-size: 15px; font-weight: 700; margin: 7px 0 3px; }
    .ia .li { margin: 3px 0 3px 6px; }
    .hora { font-size: 10px; opacity: 0.55; margin-top: 4px; text-align: right; }
    .yo .hora { color: rgba(255,255,255,0.8); }
    code.inline {
      background: rgba(125,125,125,0.18);
      padding: 1px 5px;
      border-radius: 5px;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.92em;
    }

    #ejemplos, #sugerencias {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 18px 8px;
    }
    #buscarConv {
      margin: 0 12px 10px;
      padding: 9px 12px;
      border: 1px solid var(--borde);
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      background: var(--fondo);
      color: var(--texto-ia);
    }
    .chip {
      background: var(--chip);
      color: var(--chip-texto);
      border: 1px solid var(--borde);
      border-radius: 18px;
      padding: 8px 14px;
      font-size: 13.5px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .chip:hover { transform: scale(1.04); }

    form {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--borde);
      background: var(--barra);
    }
    #texto {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--borde);
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      background: var(--fondo);
      color: var(--texto-ia);
    }
    #texto:focus { border-color: var(--azul); }
    #micro {
      background: var(--chip);
      color: var(--chip-texto);
      border: 1px solid var(--borde);
      border-radius: 50%;
      width: 46px;
      font-size: 18px;
      cursor: pointer;
    }
    #micro.grabando { background: #ff4d4d; color: #fff; animation: latido 1s infinite; }
    @keyframes latido { 50% { opacity: 0.5; } }
    #enviar {
      background: var(--azul);
      color: #fff;
      border: none;
      border-radius: 24px;
      padding: 0 22px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    #enviar:hover { background: var(--azul-osc); }
    #enviar.parar { background: #ff4d4d; }

    /* Panel lateral de conversaciones */
    #fondoPanel {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
      z-index: 9;
    }
    #fondoPanel.abierto { opacity: 1; pointer-events: auto; }
    #panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      max-width: 80%;
      height: 100%;
      background: var(--panel);
      box-shadow: 2px 0 16px rgba(0,0,0,0.2);
      transform: translateX(-100%);
      transition: transform 0.25s;
      z-index: 10;
      display: flex;
      flex-direction: column;
    }
    #panel.abierto { transform: translateX(0); }
    #panel h3 { margin: 0; padding: 16px; font-size: 15px; border-bottom: 1px solid var(--borde); }
    #nuevaConv {
      margin: 12px;
      padding: 11px;
      background: var(--azul);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #listaConvs { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
    .conv {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .conv:hover { background: var(--chip); }
    .conv.activa { background: var(--chip); font-weight: 600; }
    .conv .nombre {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 14px;
    }
    .conv .borrar {
      background: none;
      border: none;
      color: #ff6b6b;
      cursor: pointer;
      font-size: 15px;
    }

    /* Menú de ajustes de voz */
    #fondoAjustes {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      z-index: 12;
    }
    #fondoAjustes.abierto { display: flex; align-items: center; justify-content: center; }
    #ajustes {
      background: var(--panel);
      color: var(--texto-ia);
      width: 340px;
      max-width: 90%;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    #ajustes h3 { margin: 0 0 14px; font-size: 17px; }
    #ajustes label { display: block; margin: 14px 0 6px; font-size: 14px; font-weight: 600; }
    #ajustes select, #ajustes input[type=range] {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--borde);
      background: var(--fondo);
      color: var(--texto-ia);
    }
    #ajustes input[type=range] { padding: 0; }
    .ajustes-botones { display: flex; gap: 8px; margin-top: 18px; }
    .ajustes-botones button {
      flex: 1;
      padding: 11px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #probarVoz { background: var(--chip); color: var(--chip-texto); }
    #cerrarAjustes { background: var(--azul); color: #fff; }

    /* Botón de copiar respuesta */
    .copiar-msg {
      display: block;
      margin-top: 8px;
      background: transparent;
      border: 1px solid var(--borde);
      color: var(--chip-texto);
      border-radius: 8px;
      padding: 3px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .copiar-msg:hover { background: var(--chip); }
  </style>
</head>
<body>
  <header>
    <button id="btnMenu" class="icono" title="Mis conversaciones">☰</button>
    <div class="titulo">
      <b>Asistente IA</b>
      <span>Creado por Samuel</span>
    </div>
    <div class="acciones">
      <button id="btnNuevoRapido" class="icono" title="Nueva conversación">➕</button>
      <button id="btnCompartir" class="icono" title="Compartir conversación">📤</button>
      <button id="btnVoz" class="icono" title="Activar/desactivar voz">🔇</button>
      <button id="btnAjustes" class="icono" title="Ajustes">⚙️</button>
      <button id="btnPantalla" class="icono" title="Pantalla completa">⛶</button>
      <button id="btnTema" class="icono" title="Modo claro/oscuro">🌙</button>
    </div>
  </header>

  <div id="mensajes"></div>
  <div id="ejemplos"></div>
  <div id="sugerencias"></div>

  <form id="formulario">
    <input id="texto" type="text" placeholder="Escribe tu mensaje..." autocomplete="off" />
    <button id="micro" type="button" title="Hablar por voz">🎤</button>
    <button id="enviar" type="submit">Enviar</button>
  </form>

  <!-- Panel lateral de conversaciones -->
  <div id="fondoPanel"></div>
  <nav id="panel">
    <h3>💬 Mis conversaciones</h3>
    <button id="nuevaConv">➕ Nueva conversación</button>
    <input id="buscarConv" type="text" placeholder="🔍 Buscar conversación..." />
    <div id="listaConvs"></div>
  </nav>

  <!-- Menú de ajustes de voz -->
  <div id="fondoAjustes">
    <div id="ajustes">
      <h3>⚙️ Ajustes</h3>
      <label for="selModo">🎭 Personalidad del asistente</label>
      <select id="selModo">
        <option value="amigable">😊 Amigable</option>
        <option value="profesor">👨‍🏫 Profesor</option>
        <option value="programador">💻 Programador</option>
        <option value="gracioso">😄 Gracioso</option>
      </select>
      <label for="selModelo">🧠 Cerebro (modelo de IA)</label>
      <select id="selModelo">
        <option value="inteligente">🦉 Inteligente (mejor respuesta)</option>
        <option value="rapido">⚡ Rápido (responde al instante)</option>
      </select>
      <hr style="border:none;border-top:1px solid var(--borde);margin:16px 0;" />
      <label for="selVoz">🎙️ Voz</label>
      <select id="selVoz"></select>
      <label>Velocidad: <span id="valVel"></span></label>
      <input id="sliderVel" type="range" min="0.5" max="1.4" step="0.02" />
      <label>Tono: <span id="valTono"></span></label>
      <input id="sliderTono" type="range" min="0.6" max="1.6" step="0.02" />
      <div class="ajustes-botones">
        <button id="probarVoz">🔊 Probar</button>
        <button id="cerrarAjustes">Listo</button>
      </div>
    </div>
  </div>

  <script>
    const mensajes = document.getElementById("mensajes");
    const ejemplos = document.getElementById("ejemplos");
    const formulario = document.getElementById("formulario");
    const texto = document.getElementById("texto");
    const enviar = document.getElementById("enviar");
    const micro = document.getElementById("micro");
    const btnTema = document.getElementById("btnTema");
    const btnVoz = document.getElementById("btnVoz");
    const btnPantalla = document.getElementById("btnPantalla");
    const btnNuevoRapido = document.getElementById("btnNuevoRapido");
    const btnAjustes = document.getElementById("btnAjustes");
    const btnCompartir = document.getElementById("btnCompartir");
    const selModo = document.getElementById("selModo");
    const selModelo = document.getElementById("selModelo");
    const fondoAjustes = document.getElementById("fondoAjustes");
    const selVoz = document.getElementById("selVoz");
    const sliderVel = document.getElementById("sliderVel");
    const sliderTono = document.getElementById("sliderTono");
    const valVel = document.getElementById("valVel");
    const valTono = document.getElementById("valTono");
    const probarVoz = document.getElementById("probarVoz");
    const cerrarAjustes = document.getElementById("cerrarAjustes");
    const btnMenu = document.getElementById("btnMenu");
    const panel = document.getElementById("panel");
    const fondoPanel = document.getElementById("fondoPanel");
    const nuevaConv = document.getElementById("nuevaConv");
    const listaConvs = document.getElementById("listaConvs");
    const sugerencias = document.getElementById("sugerencias");
    const buscarConv = document.getElementById("buscarConv");

    const CLAVE_CONVS = "conversaciones";
    const CLAVE_ACTUAL = "conversacion-actual";
    const CLAVE_MODO = "modo-asistente";
    const CLAVE_MODELO = "modelo-asistente";
    const PREGUNTAS = [
      "Escríbeme un ejemplo de código en Go 💻",
      "Dame una idea para un proyecto",
      "Cuéntame un chiste de programadores 😄",
      "¿Cómo empiezo a aprender a programar?",
    ];

    let conversaciones = [];   // [{id, titulo, mensajes:[]}]
    let idActual = null;
    let leerEnVoz = false;
    let cargando = false;
    let aborto = null;         // para el botón de parar
    let modoElegido = localStorage.getItem(CLAVE_MODO) || "amigable"; // personalidad
    let modeloElegido = localStorage.getItem(CLAVE_MODELO) || "inteligente"; // cerebro

    // ---------- Conversaciones (#6) ----------
    function convActual() {
      return conversaciones.find((c) => c.id === idActual);
    }
    function historial() {
      return convActual() ? convActual().mensajes : [];
    }
    function nuevoId() {
      return "c" + Date.now() + Math.floor(Math.random() * 1000);
    }
    function guardarTodo() {
      localStorage.setItem(CLAVE_CONVS, JSON.stringify(conversaciones));
      localStorage.setItem(CLAVE_ACTUAL, idActual || "");
    }
    function cargarTodo() {
      try {
        const g = JSON.parse(localStorage.getItem(CLAVE_CONVS) || "[]");
        if (Array.isArray(g)) conversaciones = g;
      } catch (e) {}
      idActual = localStorage.getItem(CLAVE_ACTUAL);
      if (!conversaciones.length || !convActual()) {
        crearNueva();
      } else {
        render();
      }
      pintarLista();
    }
    function crearNueva() {
      const conv = { id: nuevoId(), titulo: "Nueva conversación", mensajes: [] };
      conversaciones.unshift(conv);
      idActual = conv.id;
      guardarTodo();
      render();
      pintarLista();
    }
    function seleccionar(id) {
      idActual = id;
      guardarTodo();
      render();
      pintarLista();
      cerrarPanel();
    }
    function borrar(id, ev) {
      ev.stopPropagation();
      conversaciones = conversaciones.filter((c) => c.id !== id);
      if (idActual === id) {
        if (conversaciones.length) idActual = conversaciones[0].id;
        else { crearNueva(); return; }
      }
      guardarTodo();
      render();
      pintarLista();
    }
    function pintarLista() {
      listaConvs.innerHTML = "";
      // #D — filtro de búsqueda: por título o por contenido de los mensajes.
      const q = (buscarConv.value || "").toLowerCase().trim();
      const lista = !q
        ? conversaciones
        : conversaciones.filter(
            (c) =>
              c.titulo.toLowerCase().includes(q) ||
              c.mensajes.some((m) => m.content.toLowerCase().includes(q))
          );
      lista.forEach((c) => {
        const div = document.createElement("div");
        div.className = "conv" + (c.id === idActual ? " activa" : "");
        div.onclick = () => seleccionar(c.id);
        const nombre = document.createElement("div");
        nombre.className = "nombre";
        nombre.textContent = c.titulo;
        const x = document.createElement("button");
        x.className = "borrar";
        x.textContent = "🗑";
        x.title = "Borrar";
        x.onclick = (ev) => borrar(c.id, ev);
        div.appendChild(nombre);
        div.appendChild(x);
        listaConvs.appendChild(div);
      });
    }

    function abrirPanel() { panel.classList.add("abierto"); fondoPanel.classList.add("abierto"); }
    function cerrarPanel() { panel.classList.remove("abierto"); fondoPanel.classList.remove("abierto"); }

    // ---------- Formato del texto (#1 código bonito) ----------
    function escaparHTML(s) {
      return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }
    function formatear(raw) {
      let s = escaparHTML(raw);
      const bloques = [];
      // Bloques de código → cada uno en su propia línea (marcador BLOQUEn).
      s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (m, lang, code) => {
        bloques.push(code.replace(/\n+$/, ""));
        return "\nBLOQUE" + (bloques.length - 1) + "\n";
      });
      // Código en línea y negrita.
      s = s.replace(/`([^`]+)`/g, '<code class="inline">$1</code>');
      s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      // Procesar línea por línea: títulos, listas, texto. (#A mejor formato)
      s = s.split("\n").map((linea) => {
        let m;
        if ((m = linea.match(/^BLOQUE(\d+)$/))) {
          return '<div class="codigo"><button class="copiar" onclick="copiarCodigo(this)">Copiar</button>' +
            '<pre><code>' + bloques[m[1]] + '</code></pre></div>';
        }
        if ((m = linea.match(/^\s*###\s+(.*)/))) return '<div class="t3">' + m[1] + "</div>";
        if ((m = linea.match(/^\s*##\s+(.*)/))) return '<div class="t2">' + m[1] + "</div>";
        if ((m = linea.match(/^\s*#\s+(.*)/))) return '<div class="t1">' + m[1] + "</div>";
        if ((m = linea.match(/^\s*[-*]\s+(.*)/))) return '<div class="li">• ' + m[1] + "</div>";
        if ((m = linea.match(/^\s*(\d+)\.\s+(.*)/))) return '<div class="li">' + m[1] + ". " + m[2] + "</div>";
        if (linea.trim() === "") return "";
        return linea + "<br>";
      }).join("");
      return s;
    }
    function copiarCodigo(btn) {
      const code = btn.parentElement.querySelector("code").textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = "¡Copiado!";
        setTimeout(() => (btn.textContent = "Copiar"), 1500);
      });
    }

    // #C — hora del mensaje (HH:MM).
    function horaActual() {
      return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    }
    function agregarHora(div, hora) {
      if (!hora) return;
      const h = document.createElement("div");
      h.className = "hora";
      h.textContent = hora;
      div.appendChild(h);
    }

    // Pone la respuesta de la IA con formato + botón "Copiar" (#B) + hora (#C).
    function ponerContenidoIA(div, texto, hora) {
      div.innerHTML = formatear(texto);
      const btn = document.createElement("button");
      btn.className = "copiar-msg";
      btn.textContent = "📋 Copiar";
      btn.onclick = () => {
        navigator.clipboard.writeText(texto).then(() => {
          btn.textContent = "✅ ¡Copiado!";
          setTimeout(() => (btn.textContent = "📋 Copiar"), 1500);
        });
      };
      div.appendChild(btn);
      agregarHora(div, hora);
    }

    function pintar(rol, contenido, hora) {
      const div = document.createElement("div");
      div.className = "burbuja " + (rol === "user" ? "yo" : "ia");
      if (rol === "user") {
        div.textContent = contenido;
        agregarHora(div, hora);
      } else if (contenido === "…") {
        div.innerHTML = "…";
      } else {
        ponerContenidoIA(div, contenido, hora);
      }
      mensajes.appendChild(div);
      mensajes.scrollTop = mensajes.scrollHeight;
      return div;
    }

    // Vuelve a dibujar la conversación actual.
    function render() {
      mensajes.innerHTML = "";
      const h = historial();
      if (h.length === 0) {
        pintar("assistant", "¡Hola! Soy tu asistente. ¿En qué te ayudo? 🙂");
        mostrarEjemplos();
      } else {
        ejemplos.innerHTML = "";
        h.forEach((m) => pintar(m.role, m.content, m.hora));
      }
    }

    function mostrarEjemplos() {
      ejemplos.innerHTML = "";
      PREGUNTAS.forEach((p) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = p;
        chip.addEventListener("click", () => enviarMensaje(p));
        ejemplos.appendChild(chip);
      });
    }

    // #A — Preguntas sugeridas + #B — Regenerar (tras cada respuesta).
    const SUGERENCIAS = [
      { etiqueta: "📝 Dame un ejemplo", texto: "Dame un ejemplo" },
      { etiqueta: "🔁 Explícamelo más simple", texto: "Explícamelo más simple" },
      { etiqueta: "➡️ ¿Qué más?", texto: "¿Qué más me puedes decir sobre esto?" },
    ];
    function limpiarSugerencias() {
      sugerencias.innerHTML = "";
    }
    function mostrarSugerencias() {
      sugerencias.innerHTML = "";
      SUGERENCIAS.forEach((s) => {
        const chip = document.createElement("div");
        chip.className = "chip";
        chip.textContent = s.etiqueta;
        chip.addEventListener("click", () => enviarMensaje(s.texto));
        sugerencias.appendChild(chip);
      });
      // Botón regenerar
      const reg = document.createElement("div");
      reg.className = "chip";
      reg.textContent = "🔄 Otra respuesta";
      reg.addEventListener("click", regenerar);
      sugerencias.appendChild(reg);
    }

    // #B — Regenerar la última respuesta (vuelve a preguntar lo mismo).
    function regenerar() {
      if (cargando) return;
      const h = historial();
      if (!h.length) return;
      if (h[h.length - 1].role === "assistant") h.pop(); // quita la respuesta
      const ultimoUser = h.length ? h[h.length - 1] : null;
      if (!ultimoUser || ultimoUser.role !== "user") return;
      h.pop(); // enviarMensaje lo vuelve a añadir
      guardarTodo();
      render();
      enviarMensaje(ultimoUser.content);
    }

    // ---------- Voz (#3) ----------
    // ---------- Voz: configuración guardada por el usuario ----------
    const CLAVE_VOZ = "ajustes-voz";
    let configVoz = { nombre: null, rate: 0.9, pitch: 1.1 };
    try {
      const g = JSON.parse(localStorage.getItem(CLAVE_VOZ) || "null");
      if (g) configVoz = g;
    } catch (e) {}

    function vocesEs() {
      const voces = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      const es = voces.filter((v) => v.lang && v.lang.toLowerCase().startsWith("es"));
      return es.length ? es : voces;
    }
    function vozPorDefecto() {
      const es = vocesEs();
      return (
        es.find((v) => /mónica|monica|paulina|marisol|lucia|esperanza|sabina|female|mujer/i.test(v.name)) ||
        es[0] || null
      );
    }
    function vozActual() {
      const voces = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
      return voces.find((v) => v.name === configVoz.nombre) || vozPorDefecto();
    }
    function limpiarParaVoz(t) {
      return t
        .replace(/```[\s\S]*?```/g, " código ")
        .replace(/[*`#_]/g, "")
        .replace(/[\u{1F000}-\u{1FAFF}\u{2600}-\u{27BF}\u{FE0F}\u{200D}\u{1F3FB}-\u{1F3FF}]/gu, "");
    }
    function decir(texto) {
      if (!window.speechSynthesis) return;
      const u = new SpeechSynthesisUtterance(limpiarParaVoz(texto));
      u.lang = "es-ES";
      const v = vozActual();
      if (v) u.voice = v;
      u.rate = configVoz.rate;
      u.pitch = configVoz.pitch;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(u);
    }
    function hablar(t) {
      if (leerEnVoz) decir(t);
    }

    // ---------- Menú de ajustes de voz ----------
    function poblarVoces() {
      if (!selVoz) return;
      const voces = vocesEs();
      selVoz.innerHTML = "";
      voces.forEach((v) => {
        const op = document.createElement("option");
        op.value = v.name;
        op.textContent = v.name + (v.lang ? " (" + v.lang + ")" : "");
        if (v.name === configVoz.nombre) op.selected = true;
        selVoz.appendChild(op);
      });
      if (!configVoz.nombre) {
        const def = vozPorDefecto();
        if (def) { configVoz.nombre = def.name; selVoz.value = def.name; }
      }
    }
    function refrescarLabels() {
      sliderVel.value = configVoz.rate;
      sliderTono.value = configVoz.pitch;
      valVel.textContent = configVoz.rate.toFixed(2);
      valTono.textContent = configVoz.pitch.toFixed(2);
    }
    function guardarVoz() { localStorage.setItem(CLAVE_VOZ, JSON.stringify(configVoz)); }

    if (window.speechSynthesis) {
      poblarVoces();
      refrescarLabels();
      window.speechSynthesis.onvoiceschanged = poblarVoces;
    }

    btnAjustes.addEventListener("click", () => {
      poblarVoces();
      refrescarLabels();
      fondoAjustes.classList.add("abierto");
    });
    cerrarAjustes.addEventListener("click", () => fondoAjustes.classList.remove("abierto"));
    fondoAjustes.addEventListener("click", (e) => {
      if (e.target === fondoAjustes) fondoAjustes.classList.remove("abierto");
    });
    selVoz.addEventListener("change", () => { configVoz.nombre = selVoz.value; guardarVoz(); });
    sliderVel.addEventListener("input", () => {
      configVoz.rate = parseFloat(sliderVel.value);
      valVel.textContent = configVoz.rate.toFixed(2);
      guardarVoz();
    });
    sliderTono.addEventListener("input", () => {
      configVoz.pitch = parseFloat(sliderTono.value);
      valTono.textContent = configVoz.pitch.toFixed(2);
      guardarVoz();
    });
    probarVoz.addEventListener("click", () =>
      decir("Hola, soy tu asistente. Así sueno con esta configuración.")
    );

    // ---------- Botón parar (#5) ----------
    function modoCargando(activo) {
      cargando = activo;
      enviar.textContent = activo ? "⏹ Parar" : "Enviar";
      enviar.classList.toggle("parar", activo);
    }

    // ---------- Comandos: abrir cursos/páginas ----------
    function quitarAcentos(s) {
      return s.normalize("NFD").replace(/[̀-ͯ]/g, "");
    }
    const CURSOS = [
      { re: /mecanograf|teclado|escribir rapido/, url: "https://www.mecanografia-online.com/", nombre: "un curso de mecanografía ⌨️" },
      { re: /\bflutter\b|\bdart\b/, url: "https://docs.flutter.dev/", nombre: "la documentación de Flutter 📱" },
      { re: /\bgolang\b|\bgo\b/, url: "https://go.dev/learn/", nombre: "recursos para aprender Go 💻" },
      { re: /\bpython\b/, url: "https://www.python.org/about/gettingstarted/", nombre: "recursos para aprender Python 🐍" },
    ];
    function detectarCurso(texto) {
      const t = quitarAcentos(texto.toLowerCase());
      const pideAbrir = /(abre|abreme|abrir|curso de|quiero aprender|ensename|aprender)/.test(t);
      if (!pideAbrir) return null;
      return CURSOS.find((c) => c.re.test(t)) || null;
    }

    async function enviarMensaje(contenido) {
      contenido = contenido.trim();
      if (!contenido || cargando) return;

      ejemplos.innerHTML = "";
      limpiarSugerencias();
      const horaUser = horaActual();
      pintar("user", contenido, horaUser);
      historial().push({ role: "user", content: contenido, hora: horaUser });
      // El título de la conversación = primer mensaje del usuario.
      if (convActual() && convActual().mensajes.length === 1) {
        convActual().titulo = contenido.slice(0, 30);
        pintarLista();
      }
      guardarTodo();
      texto.value = "";

      // ¿Es un comando para abrir un curso/página?
      const curso = detectarCurso(contenido);
      if (curso) {
        window.open(curso.url, "_blank");
        const conf = "¡Listo! Te he abierto " + curso.nombre + " en una pestaña nueva. 👍";
        pintar("assistant", conf);
        historial().push({ role: "assistant", content: conf });
        guardarTodo();
        hablar(conf);
        texto.focus();
        return;
      }

      modoCargando(true);
      const pensando = pintar("assistant", "…");
      let acumulado = "";
      aborto = new AbortController();

      try {
        const resp = await fetch("/chat/stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: historial(), modo: modoElegido, modelo: modeloElegido }),
          signal: aborto.signal,
        });
        const lector = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let errorMsg = "";

        while (true) {
          const { done, value } = await lector.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const partes = buffer.split("\n\n");
          buffer = partes.pop();
          for (const parte of partes) {
            const linea = parte.split("\n").find((l) => l.startsWith("data: "));
            if (!linea) continue;
            const data = linea.slice(6);
            if (data === "[DONE]") continue;
            try {
              const obj = JSON.parse(data);
              if (obj.error) errorMsg = obj.error;
              else if (obj.t) {
                acumulado += obj.t;
                pensando.textContent = acumulado;
                mensajes.scrollTop = mensajes.scrollHeight;
              }
            } catch (e) {}
          }
        }

        if (errorMsg) {
          pensando.textContent = "⚠️ " + errorMsg;
        } else {
          const horaIA = horaActual();
          ponerContenidoIA(pensando, acumulado, horaIA);
          historial().push({ role: "assistant", content: acumulado, hora: horaIA });
          guardarTodo();
          hablar(acumulado);
          mostrarSugerencias(); // preguntas sugeridas y regenerar
        }
      } catch (err) {
        if (err.name === "AbortError") {
          // El usuario pulsó "parar": guardamos lo que llegó.
          if (acumulado) {
            ponerContenidoIA(pensando, acumulado);
            historial().push({ role: "assistant", content: acumulado });
            guardarTodo();
          } else {
            pensando.remove();
          }
        } else {
          pensando.textContent = "⚠️ No se pudo conectar con el servidor.";
        }
      } finally {
        modoCargando(false);
        texto.focus();
      }
    }

    // ---------- Eventos ----------
    formulario.addEventListener("submit", (e) => {
      e.preventDefault();
      if (cargando) {
        if (aborto) aborto.abort(); // botón en modo "parar"
      } else {
        enviarMensaje(texto.value);
      }
    });

    btnMenu.addEventListener("click", abrirPanel);
    fondoPanel.addEventListener("click", cerrarPanel);
    buscarConv.addEventListener("input", pintarLista); // #D — buscar
    nuevaConv.addEventListener("click", () => { crearNueva(); cerrarPanel(); });
    btnNuevoRapido.addEventListener("click", () => crearNueva());

    // #A — Personalidad del asistente
    selModo.value = modoElegido;
    selModo.addEventListener("change", () => {
      modoElegido = selModo.value;
      localStorage.setItem(CLAVE_MODO, modoElegido);
    });

    // #B — Cerebro (modelo de IA)
    selModelo.value = modeloElegido;
    selModelo.addEventListener("change", () => {
      modeloElegido = selModelo.value;
      localStorage.setItem(CLAVE_MODELO, modeloElegido);
    });

    // #C — Compartir la conversación
    btnCompartir.addEventListener("click", async () => {
      const h = historial();
      if (!h.length) {
        alert("Escribe algo primero para poder compartir la conversación. 🙂");
        return;
      }
      const texto = h
        .map((m) => (m.role === "user" ? "🧑 Yo: " : "🤖 Asistente: ") + m.content)
        .join("\n\n");
      const completo = "💬 Conversación con mi Asistente IA\n\n" + texto;
      try {
        if (navigator.share) {
          await navigator.share({ title: "Asistente IA", text: completo });
        } else {
          await navigator.clipboard.writeText(completo);
          alert("¡Conversación copiada! 📋 Ya puedes pegarla donde quieras.");
        }
      } catch (e) {}
    });

    btnTema.addEventListener("click", () => {
      document.body.classList.toggle("oscuro");
      btnTema.textContent = document.body.classList.contains("oscuro") ? "☀️" : "🌙";
    });

    // Pantalla completa
    btnPantalla.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        btnPantalla.classList.add("activo");
      } else {
        document.exitFullscreen();
        btnPantalla.classList.remove("activo");
      }
    });
    document.addEventListener("fullscreenchange", () => {
      btnPantalla.classList.toggle("activo", !!document.fullscreenElement);
    });

    btnVoz.addEventListener("click", () => {
      leerEnVoz = !leerEnVoz;
      btnVoz.classList.toggle("activo", leerEnVoz);
      btnVoz.textContent = leerEnVoz ? "🔊" : "🔇";
      btnVoz.title = leerEnVoz ? "Voz activada (toca para apagar)" : "Voz apagada (toca para que hable)";
      if (!leerEnVoz && window.speechSynthesis) window.speechSynthesis.cancel();
    });

    const Reconocimiento = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (Reconocimiento) {
      const rec = new Reconocimiento();
      rec.lang = "es-ES";
      rec.onresult = (e) => {
        texto.value = e.results[0][0].transcript;
        micro.classList.remove("grabando");
        texto.focus();
      };
      rec.onend = () => micro.classList.remove("grabando");
      micro.addEventListener("click", () => {
        try { micro.classList.add("grabando"); rec.start(); }
        catch (e) { micro.classList.remove("grabando"); }
      });
    } else {
      micro.style.display = "none";
    }

    // Arranque
    cargarTodo();
  </script>
</body>
</html>
